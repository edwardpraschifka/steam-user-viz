<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit</title>
    <link rel="stylesheet" href="./static/styles.css"></link>
    <script src="//cdn.jsdelivr.net/npm/3d-force-graph"></script>
</head>
<body>
    <div class="window">
        <div id="sidebar"></div>
        <div class="searchbar">
            <div class="searchbar-inner">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="id" placeholder="Enter Steam ID…" autocomplete="off" spellcheck="false"/>
                <button id="submit-btn" onclick="handleSubmit()">Search</button>
            </div>
        </div>
        <div id="graph"></div>
    </div>

    <script type="module" src="./static/index.js"></script>
</body>
</html>
